name: Release NixOS unstable minimal ISO
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_run:
    workflows: [update-flake-lock]
    types:
      - completed
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/actions

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Check repo
        uses: actions/checkout@v4

      - name: Build Minimal ISO
        run: |
          env NIXPKGS_ALLOW_BROKEN=1 nix build .#nixosConfigurations.nixos-minimal.config.system.build.isoImage --impure

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: Unstable-minimal-ISO.iso
          path: result/iso/

  release:
    needs: [build]
    permissions:
      contents: write
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4.1.8
        with:
          name: Unstable-ISO.iso

      - name: Generate timestamp tag
        id: tag
        run: |
          echo "tag=$(date -u +'%Y.%m.%d-%H.%M')" >> $GITHUB_OUTPUT

      - name: release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          title: Continuous build ${{ steps.tag.outputs.tag }}
          automatic_release_tag: ${{ steps.tag.outputs.tag }}
          prerelease: false
          draft: false
          files: |
            *.iso*
          repo_token: ${{ secrets.GITHUB_TOKEN }}
